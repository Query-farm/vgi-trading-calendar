#
# Build + publish the multi-arch vgi-trading-calendar image to ghcr.io. The heavy
# lifting (multi-arch build -> smoke -> image test -> push-by-digest -> manifest ->
# cosign-sign) lives in the shared reusable workflow
# Query-farm/vgi-actions/docker-publish.yml; this file gates on the repo's own CI
# and supplies the worker-specific inputs.
#
# Tag-driven: vX.Y.Z -> :X.Y.Z / :X.Y / :latest; push to main -> :edge.
name: Publish image to ghcr.io

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate every image on the full unit + lint + vgi-lint + SQL E2E suite, so a
  # broken worker is never imaged.
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: [ci]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: Query-farm/vgi-actions/.github/workflows/docker-publish.yml@v1
    secrets: inherit
    with:
      image_name: vgi-trading-calendar
      smoke_import: "vgi_trading_calendar, exchange_calendars"
      health_port: "8000"
      # Validate the built image's two transports against the signed community vgi
      # extension. The worker *logic* over stdio/http/unix is already exercised on
      # every run by the gating `ci` job (the full test/sql suite, three transports,
      # two OSes), so here we just prove the IMAGE's entrypoints speak the protocol:
      #   - stdio: run the authoritative trading.test through the image's stdio
      #     entrypoint (one cold container for the whole file — the vgi extension
      #     spawns `docker run -i --rm … stdio` once per ATTACH and pools it);
      #   - http:  boot one warm container and confirm /health serves 200.
      # $CITEST_IMAGE is the loaded <image>:citest-amd64 ref; GH_TOKEN is provided.
      image_test: |
        _t0=$(date +%s)
        echo "::group::image + runner facts"
        docker image inspect "$CITEST_IMAGE" --format 'image size: {{.Size}} bytes  arch: {{.Architecture}}' || true
        echo "runner: $(nproc) cpus"; free -h 2>/dev/null || true
        echo "::endgroup::"

        echo "::group::download haybarn-unittest"
        REL=$(gh release view --repo Query-farm-haybarn/haybarn --json tagName --jq .tagName)
        gh release download "$REL" --repo Query-farm-haybarn/haybarn \
          --pattern 'haybarn_unittest-linux-amd64.zip' --output hb.zip --clobber
        mkdir -p hb && unzip -o -q hb.zip -d hb
        export HAYBARN_UNITTEST="$PWD/$(find hb -name 'haybarn-unittest' -type f | head -1)"
        chmod +x "$HAYBARN_UNITTEST"
        echo "::endgroup::"
        T_HB=$(date +%s)

        echo "::group::stdio entrypoint E2E (trading.test through the image, one cold container)"
        TRANSPORT=subprocess \
          WORKER_CMD="docker run -i --rm $CITEST_IMAGE stdio" \
          ci/run-integration.sh
        echo "::endgroup::"
        T_STDIO=$(date +%s)

        echo "::group::http /health smoke (one warm container)"
        CID=$(docker run -d -p 8000:8000 "$CITEST_IMAGE")
        trap 'docker rm -f "$CID" >/dev/null 2>&1' EXIT
        ok=""
        for _ in $(seq 1 30); do curl -fsS -o /dev/null http://localhost:8000/health && { ok=1; break; }; sleep 1; done
        [ -n "$ok" ] || { echo "ERROR: /health never returned 200"; docker logs "$CID" || true; exit 1; }
        echo "health: $(curl -fsS http://localhost:8000/health)"
        echo "::endgroup::"
        T_HTTP=$(date +%s)

        {
          echo "### Image test timing — $CITEST_IMAGE"
          echo ""
          echo "| phase | seconds |"
          echo "| --- | ---: |"
          echo "| download haybarn | $((T_HB - _t0)) |"
          echo "| stdio E2E (trading.test, 1 cold container) | $((T_STDIO - T_HB)) |"
          echo "| http /health (1 warm container) | $((T_HTTP - T_STDIO)) |"
          echo "| **total** | $((T_HTTP - _t0)) |"
        } | tee -a "${GITHUB_STEP_SUMMARY:-/dev/null}"
