# Copyright 2026 Query Farm LLC - https://query.farm
#
# Unit tests (pytest), lint, and the sqllogictest extension suite
# (test/sql/*.test) run against the vgi-trading-calendar worker through the real signed
# `vgi` DuckDB community extension via a prebuilt standalone `haybarn-unittest`.
# See ci/README.md for the design.
name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['README.md']
  pull_request:
    branches: [main]
    paths-ignore: ['README.md']
  workflow_dispatch:
  # Allow docker-publish.yml to gate the image on this exact suite before publishing.
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest -q

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Check linting
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy vgi_trading_calendar/ trading_calendar_worker.py

      # Run pydoclint in an isolated tool env (uvx): it needs
      # `docstring-parser-fork`, but vgi-rpc pulls in plain `docstring-parser`,
      # and the two share the `docstring_parser` import namespace -- installed
      # together their file order is nondeterministic and can break the import.
      - name: Docstring lint (pydoclint)
        run: uvx pydoclint --config pyproject.toml vgi_trading_calendar/ trading_calendar_worker.py

  # Metadata-quality gate: build the worker, then run the vgi-lint catalog
  # linter against the live `uv run trading_calendar_worker.py` LOCATION and fail on any
  # finding (info and up). Kept a separate job so the lint score is visible.
  metadata-quality:
    name: Metadata quality (vgi-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install the worker (with the http extra)
        run: uv sync --frozen --python 3.13 --extra http

      - name: vgi-lint
        uses: Query-farm/vgi-lint-check@v1
        with:
          version: "0.73.0"
          # Use the project venv's python (populated by `uv sync --frozen` above),
          # NOT `uv run <script>`: the PEP 723 inline-script env caches a stale SDK
          # and emits an out-of-date metadata schema (false schema-mismatch errors).
          location: "${{ github.workspace }}/.venv/bin/python ${{ github.workspace }}/trading_calendar_worker.py"
          fail-on: info

  # Resolve the latest published haybarn release once, so the whole matrix tests
  # the same version (and we never hardcode/pin it).
  resolve-haybarn:
    name: Resolve haybarn release
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.r.outputs.release }}
    steps:
      - id: r
        run: |
          REL=$(gh release view --repo Query-farm-haybarn/haybarn --json tagName --jq .tagName)
          echo "release=$REL" >> "$GITHUB_OUTPUT"
          echo "Latest haybarn release: $REL"
        env:
          GH_TOKEN: ${{ github.token }}

  integration:
    name: SQL E2E (${{ matrix.transport }}) on ${{ matrix.os }}
    needs: resolve-haybarn
    strategy:
      fail-fast: false
      matrix:
        # Run the SAME sqllogictest suite over every VGI transport. The vgi
        # extension picks the transport from the ATTACH LOCATION string that
        # run-integration.sh builds per $TRANSPORT:
        #   subprocess : `uv run trading_calendar_worker.py`  (stdio; extension spawns it)
        #   http       : `http://127.0.0.1:<port>`    (worker booted with --http)
        #   unix       : `unix:///tmp/tcal.sock`        (worker booted with --unix)
        os: [ubuntu-latest, macos-latest]
        transport: [subprocess, http, unix]
        include:
          - { os: ubuntu-latest, asset: haybarn_unittest-linux-amd64.zip }
          - { os: macos-latest,  asset: haybarn_unittest-osx-arm64.zip }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install the worker (from the lockfile, with the http extra)
        # The `http` extra pulls in waitress so the worker can serve `--http`.
        # Harmless for the subprocess/unix legs; required for the http leg.
        run: uv sync --frozen --python 3.13 --extra http

      - name: Download haybarn-unittest
        run: |
          gh release download "$HAYBARN_RELEASE" \
            --repo Query-farm-haybarn/haybarn \
            --pattern '${{ matrix.asset }}' \
            --output haybarn-unittest.zip --clobber
          mkdir -p hb && unzip -o -q haybarn-unittest.zip -d hb
        env:
          GH_TOKEN: ${{ github.token }}
          HAYBARN_RELEASE: ${{ needs.resolve-haybarn.outputs.release }}

      - name: Resolve runner + worker paths
        run: |
          # Absolute paths: run-integration.sh cd's into a staging dir before
          # invoking the runner, so relative paths would not resolve. The worker
          # is a repo-root PEP 723 script (no console-script); `uv run` reads its
          # inline deps and resolves them from PyPI, so an absolute script path
          # spawns correctly regardless of cwd — exactly how DuckDB ATTACH and
          # the pytest fixture drive it. WORKER_CMD is used directly as the
          # stdio LOCATION for subprocess, and as the process the harness boots
          # for --http / --unix.
          UNITTEST="$PWD/$(find hb -name 'haybarn-unittest' -type f | head -1)"
          chmod +x "$UNITTEST"
          echo "HAYBARN_UNITTEST=$UNITTEST" >> "$GITHUB_ENV"
          echo "WORKER_CMD=uv run --python 3.13 $PWD/trading_calendar_worker.py" >> "$GITHUB_ENV"

      - name: Run extension integration suite (${{ matrix.transport }})
        run: ci/run-integration.sh
        env:
          TRANSPORT: ${{ matrix.transport }}
